name: Release AddOn

on:
  push:
    tags:
      - '**'

permissions:
  contents: write

env:
  GITHUB_OAUTH: ${{ secrets.GITHUB_TOKEN }}
  WAGO_API_TOKEN: ${{ secrets.WAGO_API_TOKEN }}

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: BigWigsMods/packager@v2
